<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receive Your Promise</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #f5f0ff 0%, #e8f4f8 50%, #fff0f5 100%);
      color: #3d3d5c;
    }

    .title-font {
      font-family: 'Cormorant Garamond', serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .fade-in {
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn-soft {
      transition: all 0.25s ease;
    }

    .btn-soft:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(157, 141, 187, 0.22);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-8">
  <main class="w-full max-w-md">
    <div class="card rounded-3xl shadow-xl border border-purple-100 px-6 py-10 text-center fade-in">
      <p class="uppercase tracking-[0.25em] text-[11px] text-[#a08fba] mb-3">
        Mother’s Day Blessing
      </p>

      <h1 class="title-font text-4xl md:text-5xl font-bold text-[#4a3d5c] leading-tight mb-3">
        God Has a Promise for You
      </h1>

      <p class="text-sm text-[#8b7fa1] mb-8">
        Enter your name to receive a promise from God’s Word
      </p>

      <div class="text-left mb-4">
        <label for="nameInput" class="block text-sm font-medium text-[#6f6288] mb-2">
          Your name
        </label>
        <input
          id="nameInput"
          type="text"
          placeholder="Enter your name"
          class="w-full rounded-2xl border border-purple-200 bg-white px-4 py-3 text-center text-[#4a3d5c] outline-none focus:ring-2 focus:ring-purple-200"
          maxlength="40"
        >
      </div>

      <button
        id="submitBtn"
        class="btn-soft mt-3 inline-flex items-center justify-center rounded-full px-8 py-3 bg-[#b8a8d4] text-white font-medium"
      >
        Receive Your Promise
      </button>

      <p class="mt-6 text-xs text-[#b4a6ca]">
        A personal word of encouragement for today
      </p>
    </div>
  </main>

  <script>
    function goToPromise() {
      const input = document.getElementById('nameInput');
      const name = input.value.trim();

      if (!name) {
        alert('Please enter your name first.');
        input.focus();
        return;
      }

      window.location.href = 'promise.html?name=' + encodeURIComponent(name);
    }

    document.getElementById('submitBtn').addEventListener('click', goToPromise);

    document.getElementById('nameInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        goToPromise();
      }
    });
  </script>
</body>
</html>
